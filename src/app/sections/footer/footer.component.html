<footer class="footer">

  <!-- Trama de fondo decorativa (PNG provisto por diseño) -->
  <img
    class="footer__trama-bg"
    src="trama-section.png"
    alt=""
    aria-hidden="true"
    draggable="false"
  />

  <div class="container footer__inner">
    <div class="footer__brand">
      <a class="footer__logo" href="#" aria-label="Bricks Design System">
        <img src="logo-bricks-white.svg" alt="Bricks Design System" class="footer__logo-img" width="100" height="24" />
      </a>
      <p class="footer__copy">© {{ year }} Bricks Design System. Todos los derechos reservados.</p>
    </div>

    <nav class="footer__nav" aria-label="Footer navigation">
      @for (link of links; track link.label) {
        <a class="footer__link" [href]="link.href">{{ link.label }}</a>
      }
      <span class="footer__sep" aria-hidden="true"></span>
      <a class="footer__storybook" href="#" aria-label="Storybook">
        <img src="devicon-plain_storybook.svg" alt="Storybook" width="22" height="22" draggable="false" />
      </a>
    </nav>
  </div>
</footer>
