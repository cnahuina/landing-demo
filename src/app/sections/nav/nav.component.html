<div class="nav__wrapper" [class.scrolled]="scrolled">
  <nav class="nav" aria-label="Navegación principal">
    <a class="nav__brand" href="#" (click)="$event.preventDefault(); scroll('inicio')">
      <img src="logo-bricks.svg" alt="Bricks Design System" class="nav__logo" width="108" height="26" />
    </a>

    <div class="nav__right">
      <ul class="nav__links" role="list">
        @for (link of navLinks; track link.target) {
          <li class="nav__item">
            <button
              type="button"
              class="nav__link"
              [class.active]="activeSection === link.target"
              (click)="scroll(link.target)"
            >
              {{ link.label }}
              <span class="nav__dot" aria-hidden="true"></span>
            </button>
          </li>
        }
      </ul>
      <button type="button" class="nav__cta" (click)="scroll('soporte')">Empezar</button>
    </div>

    <button
      class="nav__toggle"
      [class.open]="menuOpen"
      type="button"
      (click)="toggle()"
      [attr.aria-expanded]="menuOpen"
      aria-label="Menú"
    >
      <span></span><span></span><span></span>
    </button>
  </nav>

  <div class="nav__mobile" [class.open]="menuOpen" [attr.aria-hidden]="!menuOpen">
    @for (link of navLinks; track link.target) {
      <button
        type="button"
        class="nav__mobile-link"
        [class.active]="activeSection === link.target"
        (click)="scroll(link.target)"
      >
        {{ link.label }}
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </button>
    }
    <button type="button" class="nav__mobile-cta" (click)="scroll('soporte')">
      Empezar
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
      </svg>
    </button>
  </div>
</div>
